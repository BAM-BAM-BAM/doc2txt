name: Verify
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pymupdf python-docx scikit-learn pillow pytest ruff
      - name: Lint
        run: ruff check doc2txt.py doc2txt_*.py tests/ --select E,F,W --ignore E501
      - name: Run tests
        run: python -m pytest tests/ -v
      - name: Verify import
        run: python -c "from doc2txt import SUPPORTED_EXTENSIONS; print(f'{len(SUPPORTED_EXTENSIONS)} formats supported')"

  fgt-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Clone FGT config
        # Pin fgt-config to a specific commit SHA. Unpinned HEAD-clone lets a
        # compromise of BAM-BAM-BAM/fgt-config execute arbitrary Node code in
        # this CI job with access to job secrets. Bump FGT_SHA when
        # intentionally adopting new validator behavior.
        env:
          FGT_SHA: 7bde7272b6c36fe9d9628cb6bd03c942955c38fb
        run: |
          git clone https://github.com/BAM-BAM-BAM/fgt-config /tmp/fgt
          git -C /tmp/fgt checkout "$FGT_SHA"
      - name: Validate FGT structure
        run: node /tmp/fgt/scripts/validate-fgt.mjs --project .
      - name: Check for cargo-culted content
        run: node /tmp/fgt/scripts/validate-templates.mjs --project . --domain DOC
