name: Verify
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pymupdf python-docx scikit-learn pillow pytest ruff
      - name: Lint
        run: ruff check doc2txt.py doc2txt_*.py tests/ --select E,F,W --ignore E501
      - name: Run tests
        run: python -m pytest tests/ -v
      - name: Verify import
        run: python -c "from doc2txt import SUPPORTED_EXTENSIONS; print(f'{len(SUPPORTED_EXTENSIONS)} formats supported')"

  fgt-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # fgt-config is a private repo, so the clone-at-SHA pattern fails with a
      # repo-scoped GITHUB_TOKEN (this job was red since 2026-04). The validator
      # is vendored at SHA 4b3fa8125dea instead — see vendor/fgt-config/VENDOR.md.
      - name: Validate FGT structure
        run: node vendor/fgt-config/scripts/validate-fgt.mjs --project .
      - name: Check for cargo-culted content
        run: node vendor/fgt-config/scripts/validate-templates.mjs --project . --domain DOC
